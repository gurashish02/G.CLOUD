backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "work"
    label: "Portfolio Work"
    files:
      - name: "pieces"
        label: "All Pieces"
        file: "data/work.json"
        fields:
          - label: "Pieces"
            name: "pieces"
            widget: "list"
            summary: "{{title}} — {{category}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Year", name: "year", widget: "string" }
              - { label: "Image", name: "image", widget: "image", required: false }
              - label: "Show in homepage four-up grid"
                name: "featured"
                widget: "boolean"
                default: false
                hint: "Only the first 4 pieces marked 'featured' show in the big grid right under the hero. Everything else appears in Selected Work further down."

  - name: "beforeafter"
    label: "Before / After"
    files:
      - name: "pairs"
        label: "All Pairs"
        file: "data/before-after.json"
        fields:
          - label: "Pairs"
            name: "pairs"
            widget: "list"
            summary: "{{label}}"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Before Image", name: "before", widget: "image" }
              - { label: "After Image", name: "after", widget: "image" }

  - name: "site"
    label: "Site Text"
    files:
      - name: "site"
        label: "General Info"
        file: "data/site.json"
        fields:
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Tagline (small text above headline)", name: "tagline", widget: "string" }
          - { label: "Hero Headline", name: "headline", widget: "string", hint: "Use <br> to force a line break" }
          - { label: "Hero Background Image", name: "heroImage", widget: "image" }
          - { label: "Hero Paragraph", name: "heroText", widget: "text" }
          - { label: "About Paragraph 1", name: "bio1", widget: "text" }
          - { label: "About Paragraph 2", name: "bio2", widget: "text" }
          - { label: "Skills / Tags", name: "skills", widget: "list" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Instagram handle", name: "instagram", widget: "string" }
          - { label: "Behance URL", name: "behance", widget: "string" }
